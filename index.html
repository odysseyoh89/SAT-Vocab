<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocabulary 1500</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;min-height:100vh;padding:1rem}
.app{max-width:700px;margin:0 auto;background:#fff;border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.title{font-size:20px;font-weight:600;color:#1a1a1a}
.subtitle{font-size:13px;color:#888;margin-top:2px}
.badge{font-size:12px;padding:4px 10px;border-radius:20px;background:#f0effe;color:#6c63d4;border:1px solid #d4cffa;white-space:nowrap}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;background:#f0ede8;border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 0;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:500;color:#888;cursor:pointer;transition:all 0.15s}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
select{flex:1;min-width:140px;padding:8px 12px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer}
.btn{padding:8px 16px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f5f4f0}
.progress-bar{background:#f0ede8;border-radius:4px;height:5px;margin-bottom:1.25rem;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:#7f77dd;transition:width 0.3s}
.card-area{perspective:1200px;margin-bottom:1rem}
.card{width:100%;min-height:260px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform 0.5s}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:260px;backface-visibility:hidden;border:1px solid #e8e5df;border-radius:14px;padding:1.5rem;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#fff}
.card-back{transform:rotateY(180deg)}
.word-num{font-size:12px;color:#aaa;margin-bottom:8px}
.word-main{font-size:30px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.word-pos{font-size:13px;color:#999;font-style:italic;margin-bottom:14px}
.word-def{font-size:15px;color:#2a2a2a;line-height:1.65;margin-bottom:10px;max-width:480px}
.word-def u{text-decoration-color:#7f77dd;text-underline-offset:3px;font-weight:600}
.word-kor{font-size:14px;color:#666;border-top:1px solid #f0ede8;padding-top:10px;margin-top:6px;width:100%}
.word-ex{font-size:13px;color:#999;font-style:italic;margin-top:8px;line-height:1.5;max-width:460px}
.flip-hint{font-size:12px;color:#bbb;margin-top:14px}
.card-nav{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:1rem}
.nav-btn{padding:8px 20px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer}
.nav-btn:hover{background:#f5f4f0}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.counter{font-size:14px;color:#888;min-width:80px;text-align:center}
.bm-btn{padding:8px 14px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;color:#bbb;font-size:18px;cursor:pointer;line-height:1}
.bm-btn.active{color:#e05a2b;border-color:#e05a2b}
.quiz-word{font-size:28px;font-weight:600;color:#1a1a1a;text-align:center;margin-bottom:6px}
.quiz-pos{font-size:13px;color:#999;font-style:italic;text-align:center;margin-bottom:1.25rem}
.options{display:grid;gap:10px;margin-bottom:1rem}
.opt{width:100%;padding:14px 18px;border:1px solid #e8e5df;border-radius:10px;background:#fff;color:#1a1a1a;font-size:14px;text-align:left;cursor:pointer;transition:all 0.15s;line-height:1.4}
.opt:hover:not(:disabled){background:#f5f4f0;border-color:#ccc}
.opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.opt.wrong{background:#fcebeb;border-color:#a32d2d;color:#501313}
.opt:disabled{cursor:default}
.quiz-stats{display:flex;gap:8px;margin-bottom:1rem}
.stat-card{flex:1;background:#f5f4f0;border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.quiz-feedback{text-align:center;font-size:14px;padding:10px 14px;border-radius:10px;margin-bottom:1rem;line-height:1.5}
.quiz-feedback.ok{background:#eaf3de;color:#27500a}
.quiz-feedback.bad{background:#fcebeb;color:#501313}
.next-btn{width:100%;padding:12px;border:1px solid #7f77dd;border-radius:10px;background:#7f77dd;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:none}
.next-btn:hover{background:#6c63d4}
.next-btn.show{display:block}
.search-input{width:100%;padding:10px 14px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;margin-bottom:1rem}
.word-list{display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto}
.list-item{background:#fff;border:1px solid #e8e5df;border-radius:10px;padding:12px 16px;display:grid;grid-template-columns:130px 1fr auto;gap:12px;align-items:start}
.list-word{font-weight:600;font-size:14px;color:#1a1a1a}
.list-pos{font-size:11px;color:#aaa;font-style:italic}
.list-def{font-size:13px;color:#333;line-height:1.5}
.list-def u{text-decoration-color:#7f77dd;text-underline-offset:3px;font-weight:600}
.list-kor{font-size:12px;color:#888;margin-top:3px}
.list-bm{background:none;border:none;font-size:17px;cursor:pointer;color:#ccc;padding:0;line-height:1}
.list-bm.active{color:#e05a2b}
.more-note{text-align:center;padding:12px;font-size:13px;color:#aaa}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="title">SAT Vocabulary 1500</div>
      <div class="subtitle">고빈도 단어 마스터 · 플래시카드 · 퀴즈 · 단어목록</div>
    </div>
    <div class="badge" id="setLabel">전체 1500개</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('flash')">📇 플래시카드</button>
    <button class="tab" onclick="switchTab('quiz')">✏️ 퀴즈</button>
    <button class="tab" onclick="switchTab('list')">📋 단어목록</button>
  </div>
  <div class="controls">
    <select id="categorySelect" onchange="changeCategory()">
      <option value="all">전체 단어 (1500)</option>
      <option value="0">그룹 1 — 기초 필수 (1–300)</option>
      <option value="1">그룹 2 — 핵심 (301–600)</option>
      <option value="2">그룹 3 — 고급 (601–900)</option>
      <option value="3">그룹 4 — 심화 (901–1200)</option>
      <option value="4">그룹 5 — 최고급 (1201–1500)</option>
      <option value="bookmark">⭐ 북마크한 단어</option>
    </select>
    <button class="btn" onclick="shuffleDeck()">🔀 셔플</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="flashTab">
    <div class="card-area">
      <div class="card" id="flashCard" onclick="flipCard()">
        <div class="card-face">
          <div class="word-num" id="cardNum"></div>
          <div class="word-main" id="cardWord"></div>
          <div class="word-pos" id="cardPos"></div>
          <div class="flip-hint">👆 클릭하면 뜻이 보여요</div>
        </div>
        <div class="card-face card-back">
          <div class="word-num" id="cardNum2"></div>
          <div class="word-main" id="cardWord2"></div>
          <div class="word-pos" id="cardPos2"></div>
          <div class="word-def" id="cardDef"></div>
          <div class="word-kor" id="cardKor"></div>
          <div class="word-ex" id="cardEx"></div>
        </div>
      </div>
    </div>
    <div class="card-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()">← 이전</button>
      <span class="counter" id="cardCounter">1 / 1500</span>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">다음 →</button>
      <button class="bm-btn" id="bmBtn" onclick="toggleBookmark()">☆</button>
    </div>
  </div>
  <div id="quizTab" style="display:none">
    <div class="quiz-stats">
      <div class="stat-card"><div class="stat-num" id="qC">0</div><div class="stat-label">정답</div></div>
      <div class="stat-card"><div class="stat-num" id="qW">0</div><div class="stat-label">오답</div></div>
      <div class="stat-card"><div class="stat-num" id="qS">0</div><div class="stat-label">연속 정답</div></div>
      <div class="stat-card"><div class="stat-num" id="qT">0</div><div class="stat-label">총 문제</div></div>
    </div>
    <div class="quiz-word" id="quizWord"></div>
    <div class="quiz-pos" id="quizPos"></div>
    <div class="options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback" style="display:none"></div>
    <button class="next-btn" id="nextQuizBtn" onclick="nextQuiz()">다음 문제 →</button>
  </div>
  <div id="listTab" style="display:none">
    <input class="search-input" type="text" id="searchInput" placeholder="🔍 단어 검색..." oninput="renderList()">
    <div class="word-list" id="wordList"></div>
  </div>
</div>

var qC=0,qW=0,qS=0,qT=0,currentQ=null,answered=false;
var bookmarks=new Set();

try{var b=localStorage.getItem('sat_bm');if(b)bookmarks=new Set(JSON.parse(b));}catch(e){}
function saveBm(){try{localStorage.setItem('sat_bm',JSON.stringify(Array.from(bookmarks)));}catch(e){}}

function defHTML(d){return d;}

function shuffleDeck(){
  for(var i=deck.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deck[i];deck[i]=deck[j];deck[j]=t;}
  idx=0;showCard();if(currentTab==='quiz')nextQuiz();
}

function changeCategory(){
  var v=document.getElementById('categorySelect').value;
  if(v==='all'){deck=RAW.slice();document.getElementById('setLabel').textContent='전체 '+RAW.length+'개';}
  else if(v==='bookmark'){deck=[];for(var i=0;i<RAW.length;i++){if(bookmarks.has(i))deck.push(RAW[i]);}document.getElementById('setLabel').textContent='북마크 '+deck.length+'개';}
  else{var g=parseInt(v);deck=GROUPS[g].slice();document.getElementById('setLabel').textContent='그룹 '+(g+1)+' ('+deck.length+'개)';}
  idx=0;showCard();if(currentTab==='quiz')nextQuiz();if(currentTab==='list')renderList();
}

function switchTab(t){
  currentTab=t;
  var tabs=document.querySelectorAll('.tab');
  var names=['flash','quiz','list'];
  for(var i=0;i<tabs.length;i++)tabs[i].className='tab'+(names[i]===t?' active':'');
  document.getElementById('flashTab').style.display=t==='flash'?'':'none';
  document.getElementById('quizTab').style.display=t==='quiz'?'':'none';
  document.getElementById('listTab').style.display=t==='list'?'':'none';
  if(t==='quiz'&&!currentQ)nextQuiz();
  if(t==='list')renderList();
}

function showCard(){
  if(!deck.length)return;
  var w=deck[idx];
  flipped=false;
  document.getElementById('flashCard').className='card';
  document.getElementById('cardNum').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('cardNum2').textContent=(idx+1)+' / '+deck.length;
  document.getElementById('cardWord').textContent=w[0];
  document.getElementById('cardWord2').textContent=w[0];
  document.getElementById('cardPos').textContent=w[1];
  document.getElementById('cardPos2').textContent=w[1];
  document.getElementById('cardDef').innerHTML=w[2];
  document.getElementById('cardKor').textContent='한국어: '+w[3];
  document.getElementById('cardEx').textContent='"'+w[4]+'"';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===deck.length-1;
  var ri=RAW.indexOf(w);
  document.getElementById('bmBtn').className='bm-btn'+(bookmarks.has(ri)?' active':'');
  document.getElementById('progressFill').style.width=((idx+1)/deck.length*100)+'%';
  document.getElementById('cardCounter').textContent=(idx+1)+' / '+deck.length;
}

function flipCard(){
  flipped=!flipped;
  document.getElementById('flashCard').className='card'+(flipped?' flipped':'');
}

function prevCard(){if(idx>0){idx--;showCard();}}
function nextCard(){if(idx<deck.length-1){idx++;showCard();}}

function toggleBookmark(){
  var ri=RAW.indexOf(deck[idx]);
  if(bookmarks.has(ri))bookmarks.delete(ri);else bookmarks.add(ri);
  document.getElementById('bmBtn').className='bm-btn'+(bookmarks.has(ri)?' active':'');
  saveBm();
}

function nextQuiz(){
  answered=false;
  document.getElementById('quizFeedback').style.display='none';
  document.getElementById('nextQuizBtn').className='next-btn';
  if(!deck.length){document.getElementById('quizOptions').innerHTML='<p style="text-align:center;color:#aaa;padding:2rem">이 그룹에 단어가 없습니다.</p>';return;}
  var qi=Math.floor(Math.random()*deck.length);
  var correct=deck[qi];currentQ=correct;
  document.getElementById('quizWord').textContent=correct[0];
  document.getElementById('quizPos').textContent=correct[1];
  var wrongs=[];
  while(wrongs.length<3){var r=RAW[Math.floor(Math.random()*RAW.length)];if(r!==correct&&wrongs.indexOf(r)===-1)wrongs.push(r);}
  var opts=wrongs.concat([correct]);
  opts.sort(function(){return Math.random()-0.5;});
  var container=document.getElementById('quizOptions');container.innerHTML='';
  for(var i=0;i<opts.length;i++){
    (function(opt){
      var btn=document.createElement('button');btn.className='opt';
      btn.innerHTML='<strong>'+opt[3]+'</strong><br><span style="font-size:12px;color:#999">'+opt[2].replace(/<\/?u>/g,'')+'</span>';
      btn.onclick=function(){checkAnswer(opt,correct,btn);};
      container.appendChild(btn);
    })(opts[i]);
  }
}

function checkAnswer(chosen,correct,btn){
  if(answered)return;answered=true;qT++;
  var ok=chosen===correct;
  if(ok){qC++;qS++;}else{qW++;qS=0;}
  document.getElementById('qC').textContent=qC;
  document.getElementById('qW').textContent=qW;
  document.getElementById('qS').textContent=qS;
  document.getElementById('qT').textContent=qT;
  var opts=document.querySelectorAll('.opt');
  for(var i=0;i<opts.length;i++){
    opts[i].disabled=true;
    if(opts[i]===btn&&!ok)opts[i].className='opt wrong';
    if(opts[i].querySelector('strong').textContent===correct[3])opts[i].className='opt correct';
  }
  var fb=document.getElementById('quizFeedback');fb.style.display='block';
  fb.className='quiz-feedback '+(ok?'ok':'bad');
  fb.textContent=ok?'정답! '+correct[0]+' = '+correct[3]:'오답. 정답: '+correct[3]+' ('+correct[2].replace(/<\/?u>/g,'')+')';
  document.getElementById('nextQuizBtn').className='next-btn show';
}

function renderList(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  var src=[];
  for(var i=0;i<deck.length;i++){
    var w=deck[i];
    if(!q||w[0].toLowerCase().indexOf(q)>=0||w[3].toLowerCase().indexOf(q)>=0||w[2].toLowerCase().replace(/<\/?u>/g,'').indexOf(q)>=0)src.push(w);
  }
  var list=document.getElementById('wordList');list.innerHTML='';
  var limit=Math.min(src.length,120);
  for(var i=0;i<limit;i++){
    var w=src[i];
    var ri=RAW.indexOf(w);
    var div=document.createElement('div');div.className='list-item';
    div.innerHTML='<div><div class="list-word">'+w[0]+'</div><div class="list-pos">'+w[1]+'</div></div>'
      +'<div><div class="list-def">'+w[2]+'</div><div class="list-kor">'+w[3]+'</div></div>'
      +'<button class="list-bm'+(bookmarks.has(ri)?' active':'')+'" data-ri="'+ri+'" onclick="toggleListBm('+ri+',this)">☆</button>';
    list.appendChild(div);
  }
  if(src.length>120){var n=document.createElement('div');n.className='more-note';n.textContent='+ '+(src.length-120)+'개 더 있습니다. 검색어를 입력해 좁혀보세요.';list.appendChild(n);}
}

function toggleListBm(ri,btn){
  if(bookmarks.has(ri))bookmarks.delete(ri);else bookmarks.add(ri);
  btn.className='list-bm'+(bookmarks.has(ri)?' active':'');
  saveBm();
}

showCard();
</script>
</body>
</html>
